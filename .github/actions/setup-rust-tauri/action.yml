name: Setup Rust Tauri
description: Setup Rust toolchain and cache for Tauri builds (macOS + Linux)

runs:
  using: composite
  steps:
    - name: Configure sccache env
      shell: bash
      run: |
        echo "RUSTC_WRAPPER=sccache" >> "$GITHUB_ENV"
        # Incremental + sccache fight each other: incremental fingerprints
        # are host-local and invalidate sccache lookups, so sccache never
        # hits. Disable incremental in CI only.
        echo "CARGO_INCREMENTAL=0" >> "$GITHUB_ENV"
        # sccache object cache lives in different default dirs per OS.
        # Pin via SCCACHE_DIR so actions/cache below can target it
        # without an OS-conditional path expression.
        if [ "$RUNNER_OS" = "Linux" ]; then
          echo "SCCACHE_DIR=$HOME/.cache/sccache" >> "$GITHUB_ENV"
        else
          echo "SCCACHE_DIR=$HOME/Library/Caches/Mozilla.sccache" >> "$GITHUB_ENV"
        fi

    # Workaround actions/runner-images#14099 — macos-15-arm64/20260511.0048+ and
    # macos-26-arm64/20260512.0067 ship a broken brew rustup shim at
    # /opt/homebrew/bin/cargo that intermittently shadows ~/.cargo/bin/cargo and
    # rejects all cargo subcommands ("Usage: rustup-init[EXE]"). Remove once GHA
    # publishes a fixed image.
    - name: Purge brew rust shims (workaround actions/runner-images#14099)
      shell: bash
      run: |
        set -eu
        sudo rm -f \
          /opt/homebrew/bin/cargo \
          /opt/homebrew/bin/cargo-* \
          /opt/homebrew/bin/rustc \
          /opt/homebrew/bin/rustdoc \
          /opt/homebrew/bin/rustup \
          /opt/homebrew/bin/rustup-init 2>/dev/null || true
        echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

    - name: Setup Rust toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Cache Rust artifacts
      uses: Swatinem/rust-cache@v2
      with:
        cache-on-failure: true
        cache-workspace-crates: true
        # cache-bin: false — avoids replaying a poisoned ~/.cargo/bin captured on
        # a bad macos image (Swatinem/rust-cache#341, see #14099 above).
        cache-bin: false
        shared-key: ${{ runner.os }}-tauri-v1
        workspaces: src-tauri -> target

    # Persist sccache's default object cache to complement rust-cache's
    # target/ cache. Handles build scripts and recompiles where cargo's
    # fingerprint changes but individual rustc invocations are identical.
    - name: Cache sccache objects
      uses: actions/cache@v4
      with:
        path: ${{ env.SCCACHE_DIR }}
        key: sccache-${{ runner.os }}-${{ hashFiles('src-tauri/Cargo.lock') }}
        restore-keys: sccache-${{ runner.os }}-

    - name: Install cargo-nextest
      uses: taiki-e/install-action@nextest
